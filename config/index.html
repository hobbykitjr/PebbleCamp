<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Camp Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a2e1a;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .header { text-align: center; padding: 20px 0; }
    .header h1 { font-size: 24px; color: #7bc67b; }
    .header p { color: #888; font-size: 14px; margin-top: 4px; }
    .card {
      background: #16301e;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
    }
    .card h2 { font-size: 16px; color: #7bc67b; margin-bottom: 12px; }
    label { display: block; font-size: 14px; color: #aaa; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; padding: 12px; font-size: 16px;
      background: #0f3420; border: 1px solid #7bc67b;
      border-radius: 8px; color: #fff; margin-bottom: 12px;
    }
    input::placeholder { color: #666; }
    .hint { font-size: 12px; color: #666; margin-top: -8px; margin-bottom: 12px; }
    .btn {
      display: block; width: 100%; padding: 14px; font-size: 16px;
      font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px;
    }
    .btn-save { background: #7bc67b; color: #1a2e1a; }
    .btn-cancel { background: #333; color: #aaa; margin-top: 10px; }
    .toggle-group {
      display: flex; border-radius: 8px; overflow: hidden;
      border: 1px solid #7bc67b; margin-bottom: 12px;
    }
    .toggle-group label {
      flex: 1; text-align: center; padding: 12px; font-size: 14px;
      font-weight: bold; color: #aaa; background: #0f3420;
      cursor: pointer; margin-bottom: 0;
    }
    .toggle-group input[type="radio"] { display: none; }
    .toggle-group input[type="radio"]:checked + label {
      background: #7bc67b; color: #1a2e1a;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="font-size:32px">&#x1F3D5;</div>
    <h1>Pixel Camp</h1>
    <p>Configure your camp location</p>
  </div>

  <div class="card">
    <h2>Location</h2>
    <label for="zipCode">ZIP Code or City</label>
    <input type="text" id="zipCode" placeholder="e.g. 17948" maxlength="30">
    <p class="hint">ZIP/postal code or city name for weather data</p>
  </div>

  <div class="card">
    <h2>Temperature</h2>
    <div class="toggle-group">
      <input type="radio" name="tempUnit" id="tempF" value="0">
      <label for="tempF">&deg;F</label>
      <input type="radio" name="tempUnit" id="tempC" value="1">
      <label for="tempC">&deg;C</label>
    </div>
  </div>

  <div class="card">
    <h2>Sunrise / Sunset Times</h2>
    <div class="toggle-group">
      <input type="radio" name="showSun" id="sunOn" value="1">
      <label for="sunOn">Show</label>
      <input type="radio" name="showSun" id="sunOff" value="0">
      <label for="sunOff">Hide</label>
    </div>
  </div>

  <div class="card">
    <h2>High / Low Temps</h2>
    <div class="toggle-group">
      <input type="radio" name="showHiLo" id="hiloOn" value="1">
      <label for="hiloOn">Show</label>
      <input type="radio" name="showHiLo" id="hiloOff" value="0">
      <label for="hiloOff">Hide</label>
    </div>
  </div>

  <div class="card">
    <h2>Show Seconds</h2>
    <div class="toggle-group">
      <input type="radio" name="showSec" id="secOff" value="0">
      <label for="secOff">Off</label>
      <input type="radio" name="showSec" id="secOn" value="1">
      <label for="secOn">On</label>
    </div>
    <p class="hint">Display seconds on the clock. Uses more battery.</p>
  </div>

  <div class="card">
    <h2>Developer</h2>
    <div class="toggle-group">
      <input type="radio" name="devMode" id="devOff" value="0">
      <label for="devOff">Off</label>
      <input type="radio" name="devMode" id="devOn" value="1">
      <label for="devOn">Dev Mode</label>
    </div>
    <p class="hint">Tap to cycle through time/weather presets for testing.</p>
  </div>

  <p class="error" id="locError" style="display:none; color:#ff6666; font-size:14px; padding:10px; background:#331111; border-radius:8px; margin:12px 0;"></p>
  <p class="success" id="locSuccess" style="display:none; color:#7bc67b; font-size:14px; padding:10px; background:#113311; border-radius:8px; margin:12px 0;"></p>
  <button class="btn btn-save" id="saveBtn">Save Settings</button>
  <button class="btn btn-cancel" id="cancelBtn">Cancel</button>

  <script>
    function getParam(name) {
      var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
      return match ? decodeURIComponent(match[1]) : '';
    }

    var zipField = document.getElementById('zipCode');
    zipField.value = getParam('zip') || '';

    // Show location error from last fetch attempt
    var locErr = getParam('locError');
    if (locErr) {
      var errEl = document.getElementById('locError');
      errEl.textContent = locErr;
      errEl.style.display = 'block';
      setTimeout(function() { errEl.scrollIntoView({behavior:'smooth'}); }, 300);
    }

    var tempUnit = getParam('unit') || '0';
    document.getElementById(tempUnit === '1' ? 'tempC' : 'tempF').checked = true;

    var showSun = getParam('sun') || '1';
    document.getElementById(showSun === '1' ? 'sunOn' : 'sunOff').checked = true;
    var showHiLo = getParam('hilo') || '1';
    document.getElementById(showHiLo === '1' ? 'hiloOn' : 'hiloOff').checked = true;

    var showSec = getParam('sec') || '0';
    document.getElementById(showSec === '1' ? 'secOn' : 'secOff').checked = true;

    var currentDev = getParam('dev') || '0';
    if (currentDev === '1') document.getElementById('devOn').checked = true;
    else document.getElementById('devOff').checked = true;

    var returnTo = getParam('return_to');

    function returnResult(jsonString) {
      var encoded = encodeURIComponent(jsonString);
      if (returnTo) {
        document.location = returnTo + 'response=' + encoded + '#' + encoded;
      } else {
        document.location = 'pebblejs://close#' + encoded;
      }
    }
    function returnCancel() {
      if (returnTo) document.location = returnTo;
      else document.location = 'pebblejs://close';
    }

    function isUSZip(str) { return /^\d{5}(-\d{4})?$/.test(str.trim()); }
    function isCanadianPostal(str) { return /^[A-Za-z]\d[A-Za-z]\s?\d[A-Za-z]\d$/.test(str.trim()); }
    function isUKPostcode(str) { return /^[A-Za-z]{1,2}\d[A-Za-z\d]?\s?\d[A-Za-z]{2}$/.test(str.trim()); }

    function showResult(el, msg) { el.textContent = msg; el.style.display = 'block'; el.scrollIntoView({behavior:'smooth'}); }

    function tryZippopotam(country, code, query, onSuccess, onError) {
      var url = 'https://api.zippopotam.us/' + country + '/' + code;
      var xhr = new XMLHttpRequest();
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var j = JSON.parse(xhr.responseText);
            if (j.places && j.places.length > 0) {
              showResult(document.getElementById('locSuccess'),
                'Found: ' + j.places[0]['place name'] + ', ' + j.places[0]['state abbreviation']);
              onSuccess(); return;
            }
          } catch(e) {}
        }
        // Zippopotam failed, try name search
        tryNameSearch(query, onSuccess, onError);
      };
      xhr.onerror = function() { tryNameSearch(query, onSuccess, onError); };
      xhr.open('GET', url);
      xhr.send();
    }

    function tryNameSearch(query, onSuccess, onError) {
      var succEl = document.getElementById('locSuccess');
      var url = 'https://geocoding-api.open-meteo.com/v1/search?name=' +
                encodeURIComponent(query) + '&count=1&language=en&format=json';
      var xhr = new XMLHttpRequest();
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            var j = JSON.parse(xhr.responseText);
            if (j.results && j.results.length > 0) {
              showResult(succEl, 'Found: ' + j.results[0].name + (j.results[0].country ? ', ' + j.results[0].country : ''));
              onSuccess(); return;
            }
          } catch(e) {}
        }
        onError('Location not found. Try a city name instead of a postal code.');
      };
      xhr.onerror = function() { onError('Could not verify location (network error)'); };
      xhr.open('GET', url);
      xhr.send();
    }

    function validateLocation(query, onSuccess, onError) {
      var errEl = document.getElementById('locError');
      var succEl = document.getElementById('locSuccess');
      errEl.style.display = 'none';
      succEl.style.display = 'none';

      if (!query) { onSuccess(); return; }

      if (isUSZip(query)) {
        tryZippopotam('us', query.trim(), query, onSuccess, onError);
      } else if (isCanadianPostal(query)) {
        var fsa = query.replace(/\s/g, '').substring(0, 3).toUpperCase();
        tryZippopotam('ca', fsa, query, onSuccess, onError);
      } else if (isUKPostcode(query)) {
        var clean = query.replace(/\s/g, '');
        var outward = clean.substring(0, clean.length - 3).toUpperCase();
        tryZippopotam('gb', outward, query, onSuccess, onError);
      } else {
        tryNameSearch(query, onSuccess, onError);
      }
    }

    document.getElementById('saveBtn').addEventListener('click', function () {
      var query = zipField.value.trim() || '17948';
      var selUnit = document.querySelector('input[name="tempUnit"]:checked');
      var selSun = document.querySelector('input[name="showSun"]:checked');
      var selHiLo = document.querySelector('input[name="showHiLo"]:checked');
      var selectedDev = document.querySelector('input[name="devMode"]:checked');
      var selSec = document.querySelector('input[name="showSec"]:checked');
      var sun = selSun ? parseInt(selSun.value) : 1;
      var hilo = selHiLo ? parseInt(selHiLo.value) : 1;
      var unit = selUnit ? parseInt(selUnit.value) : 0;
      var sec = selSec ? parseInt(selSec.value) : 0;
      var result = {
        zipCode: query.replace(/\s+/g, ''),
        displayMode: sun | (hilo << 1) | (sec << 2),
        showSec: sec,
        showSun: sun,
        showHiLo: hilo,
        useCelsius: unit,
        devMode: selectedDev ? selectedDev.value : '0'
      };
      console.log('CONFIG SAVE: unit=' + unit + ' selUnit=' + (selUnit ? selUnit.id + '=' + selUnit.value : 'NULL') + ' zip=' + result.zipCode);
      document.title = 'SAVE: celsius=' + unit + ' zip=' + result.zipCode;
      returnResult(JSON.stringify(result));
    });

    document.getElementById('cancelBtn').addEventListener('click', function () {
      returnCancel();
    });
  </script>
</body>
</html>
